services:
  backend:
    build: ./backend
    container_name: hydropower-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////app/data/hydropower.db
      - CACHE_EXPIRY_DAYS=7
      - LOG_LEVEL=INFO
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: hydropower-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev -- --host

volumes:
  backend-data:
